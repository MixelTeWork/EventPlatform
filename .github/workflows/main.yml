name: Build and Push to GHCR

on:
  push:
    branches:
      - deploy

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase registry path
        run: |
          echo "REGISTRY_PATH=ghcr.io/${REPOSITORY,,}" >> "${GITHUB_ENV}"
        env:
          REPOSITORY: '${{ github.repository }}'

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY_PATH }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY_PATH }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_PATH }}:buildcache,mode=max
          build-args: |
            PUBLIC_URL=${{ vars.PUBLIC_URL }}
